<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Work - Admin</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .admin-form {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background: #fff;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            border-radius: 8px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .form-group input[type="text"],
        .form-group input[type="url"],
        .form-group textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .form-group textarea {
            height: 150px;
        }
        .technologies-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }
        .technology-tag {
            background: #f0f0f0;
            padding: 5px 10px;
            border-radius: 15px;
            display: inline-flex;
            align-items: center;
        }
        .technology-tag button {
            background: none;
            border: none;
            margin-left: 5px;
            cursor: pointer;
            color: #666;
        }
        .preview-image {
            max-width: 200px;
            margin-top: 10px;
        }
        .submit-btn {
            background: #333;
            color: #fff;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .submit-btn:hover {
            background: #444;
        }
    </style>
</head>
<body>
    <div class="admin-form">
        <h1>Add New Work</h1>
        <form id="workForm">
            <div class="form-group">
                <label for="title">Project Title</label>
                <input type="text" id="title" name="title" required>
            </div>
            
            <div class="form-group">
                <label for="description">Brief Description</label>
                <textarea id="description" name="description" required></textarea>
            </div>
            
            <div class="form-group">
                <label for="category">Category</label>
                <input type="text" id="category" name="category" required>
            </div>
            
            <div class="form-group">
                <label for="technology">Technologies</label>
                <input type="text" id="technology" placeholder="Type and press Enter to add">
                <div class="technologies-container" id="technologiesContainer"></div>
            </div>
            
            <div class="form-group">
                <label for="image">Image URL</label>
                <input type="url" id="image" name="image" required>
                <img id="imagePreview" class="preview-image">
            </div>
            
            <div class="form-group">
                <label for="demoUrl">Demo URL</label>
                <input type="url" id="demoUrl" name="demoUrl">
            </div>
            
            <div class="form-group">
                <label for="githubUrl">GitHub URL</label>
                <input type="url" id="githubUrl" name="githubUrl">
            </div>
            
            <div class="form-group">
                <label for="details">Detailed Description</label>
                <textarea id="details" name="details" required></textarea>
            </div>
            
            <button type="submit" class="submit-btn">Add Project</button>
        </form>
        
        <div id="output" style="margin-top: 20px;">
            <h3>Generated JSON:</h3>
            <pre id="jsonOutput" style="background: #f5f5f5; padding: 15px; overflow-x: auto;"></pre>
        </div>
    </div>

    <script>
        let technologies = [];
        
        document.getElementById('technology').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                const tech = this.value.trim();
                if (tech && !technologies.includes(tech)) {
                    technologies.push(tech);
                    updateTechnologies();
                }
                this.value = '';
            }
        });

        function updateTechnologies() {
            const container = document.getElementById('technologiesContainer');
            container.innerHTML = technologies.map(tech => `
                <span class="technology-tag">
                    ${tech}
                    <button onclick="removeTechnology('${tech}')">&times;</button>
                </span>
            `).join('');
        }

        function removeTechnology(tech) {
            technologies = technologies.filter(t => t !== tech);
            updateTechnologies();
        }

        document.getElementById('image').addEventListener('input', function() {
            const preview = document.getElementById('imagePreview');
            preview.src = this.value;
        });

        document.getElementById('workForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = {
                id: 'project' + (new Date().getTime()),
                title: document.getElementById('title').value,
                description: document.getElementById('description').value,
                image: document.getElementById('image').value,
                category: document.getElementById('category').value,
                technologies: technologies,
                demoUrl: document.getElementById('demoUrl').value,
                githubUrl: document.getElementById('githubUrl').value,
                details: document.getElementById('details').value
            };
            
            try {
                // 1. 保存到 Git 仓库
                await saveToGit(formData);
                // 2. 触发自动部署
                await triggerDeploy();
                alert('作品已添加并开始部署');
            } catch (error) {
                alert('保存失败：' + error.message);
            }
        });

            hashSum.update(fileBuffer);

        // 2. 定期备份机制
        const backup = {
            files: ['index.html', 'work.html', 'css/*', 'js/*'],
            destination: 'backup/',
            frequency: '0 0 * * *'  // 每天备份
        };

        // 添加简单的监控
        const monitoring = {
            // 记录访问日志
            logAccess: (req) => {
                const log = {
                    timestamp: new Date(),
                    ip: req.ip,
                    path: req.path,
                    method: req.method
                };
                fs.appendFileSync('access.log', JSON.stringify(log) + '\n');
            },
            
            // 检测异常访问
            checkAbnormal: (logs) => {
                const threshold = 100; // 每分钟访问阈值
                const now = Date.now();
                const recentLogs = logs.filter(log => 
                    now - log.timestamp < 60000
                );
                return recentLogs.length > threshold;
            }
        };

        // 创建新作品
        const workManager = new WorkManager();
        const work = await workManager.addWork({
            title: 'New Project',
            description: 'Project description',
            technologies: ['JavaScript', 'HTML', 'CSS']
        });

        // 渲染作品列表
        class WorkList extends Component {
            constructor(props) {
                super(props);
                this.workManager = props.workManager;
                this.state = {
                    works: []
                };
            }

            async componentDidMount() {
                const works = await this.workManager.getWorks();
                this.setState({ works });
            }

            render() {
                return `
                    <div class="work-list">
                        ${this.state.works.map(work => `
                            <div class="work-item">
                                <h3>${work.title}</h3>
                                <p>${work.description}</p>
                            </div>
                        `).join('')}
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
